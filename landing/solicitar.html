<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamControl Pro — Solicitar Plan</title>
  <meta name="description" content="Completá tus datos y activá tu plan de StreamControl Pro por WhatsApp." />
  <meta property="og:title" content="StreamControl Pro — Solicitar Plan" />
  <meta property="og:description" content="Activá tu plan por WhatsApp en un solo paso." />
  <meta property="og:image" content="https://streamcontrol-10837.web.app/stream.webp" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4F46E5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/webp" href="/stream.webp" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-87R3DYVTQS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-87R3DYVTQS');
  </script>
  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">

  <!-- ═══ NAV ═══ -->
  <nav class="fixed top-0 inset-x-0 z-50 bg-white/70 backdrop-blur-xl border-b border-gray-100/80">
    <div class="max-w-6xl mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5 shrink-0">
        <img src="/stream.webp" alt="StreamControl Pro" class="w-7 h-7" />
        <span class="text-lg font-extrabold text-gray-900 tracking-tight">StreamControl</span>
      </a>
      <a href="/app/login" class="inline-flex items-center px-5 py-2.5 rounded-xl bg-gray-900 text-white text-sm font-semibold hover:bg-gray-800 transition-all active:scale-95 shadow-lg shadow-black/10 shrink-0">
        Iniciar sesión
      </a>
    </div>
  </nav>

  <!-- ═══ FORMULARIO ═══ -->
  <main class="flex-1 flex items-center justify-center pt-24 pb-16 px-5 sm:px-8">
    <div class="w-full max-w-lg mx-auto">

      <!-- Header -->
      <div class="text-center mb-8">
        <p class="text-sm font-semibold text-indigo-600 uppercase tracking-wider mb-2" id="plan-label">Solicitar plan</p>
        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight mb-2">Activá tu plan</h1>
        <p class="text-sm text-gray-500">Completá tus datos y te enviamos la solicitud por WhatsApp para activarlo.</p>
      </div>

      <!-- Form -->
      <form id="solicitud-form" class="bg-white rounded-2xl border border-gray-200 p-6 sm:p-8 shadow-sm space-y-5">
        <!-- Plan (hidden, se setea desde URL) -->
        <input type="hidden" name="plan" id="field-plan" />

        <!-- Nombre -->
        <div>
          <label for="field-nombre" class="block text-sm font-semibold text-gray-700 mb-1.5">Nombre completo</label>
          <input
            type="text"
            id="field-nombre"
            required
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-white text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
            placeholder="Ej: Juan Pérez"
          />
        </div>

        <!-- Email -->
        <div>
          <label for="field-email" class="block text-sm font-semibold text-gray-700 mb-1.5">Correo electrónico</label>
          <input
            type="email"
            id="field-email"
            required
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-white text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
            placeholder="ejemplo@correo.com"
          />
        </div>

        <!-- Negocio (opcional) -->
        <div>
          <label for="field-negocio" class="block text-sm font-semibold text-gray-700 mb-1.5">Nombre de tu negocio <span class="text-gray-400 font-normal">(opcional)</span></label>
          <input
            type="text"
            id="field-negocio"
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-white text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
            placeholder="Ej: StreamZone"
          />
        </div>

        <!-- Resumen del plan -->
        <div id="plan-resumen" class="bg-indigo-50 rounded-xl p-4 hidden">
          <p class="text-xs font-semibold text-indigo-600 uppercase tracking-wider mb-1">Plan seleccionado</p>
          <p class="text-lg font-bold text-gray-900" id="plan-nombre"></p>
          <p class="text-sm text-gray-500" id="plan-precio"></p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full py-3.5 rounded-xl bg-gray-900 text-white font-semibold text-sm hover:bg-gray-800 transition-all active:scale-95 shadow-lg shadow-black/10 flex items-center justify-center gap-2"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Enviar solicitud por WhatsApp
        </button>

        <p class="text-xs text-gray-400 text-center">Al enviar, serás redirigido a WhatsApp para confirmar tu solicitud. Sin compromiso.</p>
      </form>

      <div class="text-center mt-6">
        <a href="/#pricing" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">← Volver a planes</a>
      </div>
    </div>
  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer class="bg-white border-t border-gray-100 py-8">
    <div class="max-w-6xl mx-auto px-5 sm:px-8 text-center">
      <p class="text-xs text-gray-400">&copy; 2026 StreamControl Pro</p>
    </div>
  </footer>

<script>
  // ═══════════════════════════════════════════
  // CONFIGURACIÓN — Número de WhatsApp del administrador
  // ═══════════════════════════════════════════
  // Solo dígitos, con código de país. Ej: 573247349128
  var WHATSAPP_NUMBER = '573247349128';

  // Planes disponibles
  var PLANES = {
    professional: { nombre: 'Professional', precio: '$8/mes', label: 'Professional — $8/mes' },
    enterprise:  { nombre: 'Enterprise', precio: '$9/mes', label: 'Enterprise — $9/mes' },
  };

  // ===========================================
  // Cargar plan desde URL
  // ===========================================
  (function() {
    var params = new URLSearchParams(window.location.search);
    var planKey = params.get('plan');
    var plan = PLANES[planKey];

    if (!plan) {
      document.getElementById('plan-label').textContent = 'Plan no válido';
      return;
    }

    document.getElementById('field-plan').value = planKey;
    document.getElementById('plan-label').textContent = 'Solicitar plan ' + plan.nombre;
    document.getElementById('plan-nombre').textContent = plan.nombre;
    document.getElementById('plan-precio').textContent = plan.precio;
    document.getElementById('plan-resumen').classList.remove('hidden');
  })();

  // ===========================================
  // Submit — Redirigir a WhatsApp
  // ===========================================
  document.getElementById('solicitud-form').addEventListener('submit', function(e) {
    e.preventDefault();

    var planKey = document.getElementById('field-plan').value;
    var plan = PLANES[planKey];
    if (!plan) {
      alert('Seleccioná un plan válido.');
      return;
    }

    var nombre = document.getElementById('field-nombre').value.trim();
    var email = document.getElementById('field-email').value.trim();
    var negocio = document.getElementById('field-negocio').value.trim();

    if (!nombre || !email) {
      alert('Completá todos los campos obligatorios.');
      return;
    }

    var mensaje = 'Hola, quiero activar el plan ' + plan.nombre + ' de StreamControl Pro.%0A%0A' +
      'Mis datos:%0A' +
      '• Nombre: ' + nombre + '%0A' +
      '• Email: ' + email + '%0A' +
      (negocio ? '• Negocio: ' + negocio + '%0A' : '') +
      '%0A' + plan.label + '%0A' +
      'Quedo atento a la activación. Gracias!';

    window.location.href = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + mensaje;
  });
</script>
</body>
</html>
